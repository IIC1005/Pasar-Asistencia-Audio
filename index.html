<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Audio Player with Boost</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-card">
        <audio id="myAudio" src="asistencia.mp3"></audio>

        <button id="playButton">Play Asistencia</button>

        <div class="controls">
            <div class="control-group">
                <label for="volumeControl">Vol</label>
                <input type="range" id="volumeControl" min="0" max="3" step="0.1" value="1">
                <span class="volume-label" id="volumeDisplay">100%</span>
            </div>

            <div class="control-group">
                <label for="repeatCount">Repeat</label>
                <input type="number" id="repeatCount" min="0" value="1">
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
